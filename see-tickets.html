<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IPL Seat Selection</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Inter, Arial, sans-serif;
    }

    body {
      background: #f3f4f6;
      color: #111827;
      overflow: hidden;
    }

    .app {
      display: grid;
      grid-template-columns: 1.8fr 1fr;
      height: 100vh;
      width: 100%;
    }

    .left {
      background: #f1f1f1;
      border-right: 1px solid #ddd;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 16px 18px;
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      flex-wrap: wrap;
    }

    .match-info h1 {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .match-info p {
      font-size: 13px;
      color: #6b7280;
      line-height: 1.4;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .controls select,
    .controls button,
    .controls input {
      border: 1px solid #d1d5db;
      background: #fff;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
      outline: none;
    }

    .controls button {
      cursor: pointer;
      font-weight: 700;
      transition: 0.2s ease;
    }

    .controls button:hover {
      background: #f9fafb;
    }

    .stadium-wrap {
      position: relative;
      flex: 1;
      overflow: auto;
      padding: 20px;
    }

    .zoom-box {
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 20;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .zoom-box button {
      width: 46px;
      height: 46px;
      border: none;
      border-radius: 12px;
      background: #fff;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      font-size: 24px;
      cursor: pointer;
      font-weight: 700;
    }

    .seat-stage {
      min-width: 1100px;
      min-height: 900px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .stadium {
      position: relative;
      width: 900px;
      height: 900px;
      transform-origin: center center;
      transition: transform 0.25s ease;
    }

    .outer-ring {
      position: absolute;
      inset: 10px;
      border-radius: 48% 52% 50% 50% / 42% 42% 58% 58%;
      background: #ffffff;
      border: 2px solid #e5e7eb;
      box-shadow: inset 0 0 0 12px #f8fafc;
    }

    .field {
      position: absolute;
      width: 520px;
      height: 520px;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: #4f8a37;
      box-shadow: inset 0 0 0 12px #ffffff;
      z-index: 1;
    }

    .pitch {
      position: absolute;
      width: 46px;
      height: 98px;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: #d98a2b;
      border: 4px solid #bf751d;
      border-radius: 12px;
      z-index: 3;
    }

    .pitch::before,
    .pitch::after {
      content: "";
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 28px;
      height: 4px;
      background: rgba(255,255,255,0.55);
      border-radius: 10px;
    }

    .pitch::before {
      top: 18px;
    }

    .pitch::after {
      bottom: 18px;
    }

    .blocks-layer {
      position: absolute;
      inset: 0;
      z-index: 5;
    }

    .seat-block {
      position: absolute;
      width: 92px;
      height: 58px;
      border-radius: 14px;
      background: #b8d97d;
      border: 3px solid #fff;
      color: #395b24;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 16px rgba(0,0,0,0.06);
      cursor: pointer;
      transition: transform 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
      user-select: none;
      text-align: center;
      padding: 4px;
      font-size: 14px;
    }

    .seat-block:hover {
      transform: scale(1.05);
      background: #a7d067;
      box-shadow: 0 10px 24px rgba(0,0,0,0.08);
    }

    .seat-block.active {
      background: #4caf50;
      color: #fff;
    }

    .seat-block.low {
      background: #efe39a;
      color: #6a5512;
    }

    .seat-block.sold {
      background: #d1d5db;
      color: #6b7280;
      cursor: not-allowed;
    }

    .seat-block.mini {
      width: 70px;
      height: 44px;
      font-size: 12px;
    }

    .seat-block.tiny {
      width: 56px;
      height: 34px;
      font-size: 11px;
      border-radius: 10px;
    }

    .legend {
      position: absolute;
      left: 20px;
      bottom: 20px;
      z-index: 15;
      background: rgba(255,255,255,0.96);
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.06);
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      font-size: 13px;
      color: #374151;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .legend-box {
      width: 16px;
      height: 16px;
      border-radius: 5px;
      border: 1px solid #d1d5db;
    }

    .available { background: #b8d97d; }
    .few { background: #efe39a; }
    .selected { background: #4caf50; }
    .soldout { background: #d1d5db; }

    .right {
      background: #fff;
      display: flex;
      flex-direction: column;
      min-width: 0;
      height: 100vh;
    }

    .sidebar-top {
      padding: 18px;
      border-bottom: 1px solid #ececec;
      background: #fff;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .sidebar-top h2 {
      font-size: 26px;
      margin-bottom: 10px;
      font-weight: 800;
    }

    .sidebar-filters {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .sidebar-filters select {
      border: 1px solid #d1d5db;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 13px;
      background: #fff;
    }

    .listings {
      overflow-y: auto;
      flex: 1;
    }

    .ticket-card {
      padding: 18px;
      border-bottom: 1px solid #ececec;
      transition: 0.2s ease;
      cursor: pointer;
    }

    .ticket-card:hover {
      background: #fafafa;
    }

    .ticket-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
      align-items: flex-start;
    }

    .ticket-title {
      font-size: 18px;
      font-weight: 800;
      line-height: 1.25;
    }

    .ticket-price-wrap {
      text-align: right;
      flex-shrink: 0;
    }

    .ticket-price {
      font-size: 18px;
      font-weight: 800;
    }

    .ticket-row {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .ticket-meta {
      display: flex;
      flex-direction: column;
      gap: 4px;
      color: #6b7280;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .ticket-bottom {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .remaining {
      color: #e91e63;
      font-size: 14px;
      font-weight: 800;
    }

    .badge {
      background: #10b981;
      color: #fff;
      font-size: 13px;
      padding: 5px 9px;
      border-radius: 9px;
      font-weight: 800;
      display: inline-block;
    }

    .empty-state {
      padding: 30px 20px;
      color: #6b7280;
      font-size: 15px;
    }

    .book-btn {
      margin-top: 12px;
      display: inline-block;
      border: none;
      background: #111827;
      color: #fff;
      padding: 10px 14px;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .book-btn:hover {
      background: #000;
    }

    .mobile-note {
      display: none;
      padding: 10px 16px;
      background: #111827;
      color: #fff;
      font-size: 13px;
      text-align: center;
    }

    @media (max-width: 1100px) {
      body {
        overflow: auto;
      }

      .app {
        grid-template-columns: 1fr;
        height: auto;
      }

      .right {
        height: auto;
        min-height: 500px;
      }

      .left {
        min-height: 100vh;
      }

      .mobile-note {
        display: block;
      }

      .seat-stage {
        justify-content: flex-start;
      }
    }

    @media (max-width: 700px) {
      .topbar {
        flex-direction: column;
        align-items: flex-start;
      }

      .controls {
        width: 100%;
      }

      .controls select,
      .controls input {
        width: 100%;
      }
    }
  </style>
</head>

        listings: [
          { section: "North Pavilion A", row: "P1", price: 3500, ticketsTogether: 4, rating: 9.0, view: "Clear view", remaining: 4 },
          { section: "North Pavilion C", row: "P2", price: 3850, ticketsTogether: 2, rating: 8.7, view: "Good angle", remaining: 2 },
          { section: "North Pavilion F", row: "P3", price: 4300, ticketsTogether: 2, rating: 9.3, view: "Premium", remaining: 2 },
          { section: "South Stand O", row: "S2", price: 3200, ticketsTogether: 6, rating: 8.4, view: "Popular choice", remaining: 6 },
          { section: "West Stand S", row: "W1", price: 2950, ticketsTogether: 1, rating: 7.7, view: "Last seat", remaining: 1 }
        ]
      }
    };

    const matchSelector = document.getElementById("matchSelector");
    const matchTitle = document.getElementById("matchTitle");
    const matchMeta = document.getElementById("matchMeta");
    const blocksLayer = document.getElementById("blocksLayer");
    const listingsEl = document.getElementById("listings");
    const listingCount = document.getElementById("listingCount");
    const sortSelect = document.getElementById("sortSelect");
    const availabilityFilter = document.getElementById("availabilityFilter");
    const ticketCountInput = document.getElementById("ticketCount");
    const stadium = document.getElementById("stadium");

    let zoom = 1;
    let selectedMatchKey = Object.keys(matches)[0];
    let selectedBlock = null;

    function fillMatchSelector() {
      matchSelector.innerHTML = "";
      Object.keys(matches).forEach(key => {
        const option = document.createElement("option");
        option.value = key;
        option.textContent = matches[key].title;
        matchSelector.appendChild(option);
      });
      matchSelector.value = selectedMatchKey;
    }

    function getCurrentMatch() {
      return matches[selectedMatchKey];
    }

    function formatCurrency(currency, value) {
      return `${currency}${Number(value).toLocaleString()}`;
    }

    function updateHeader() {
      const match = getCurrentMatch();
      matchTitle.textContent = match.title;
      matchMeta.textContent = `${match.date} | ${match.stadium}`;
    }

    function renderBlocks() {
      const match = getCurrentMatch();
      blocksLayer.innerHTML = "";

      match.seatBlocks.forEach(block => {
        const el = document.createElement("div");
        el.className = "seat-block";
        el.style.left = block.x + "px";
        el.style.top = block.y + "px";

        if (block.size === "mini") el.classList.add("mini");
        if (block.size === "tiny") el.classList.add("tiny");
        if (block.available === 0) el.classList.add("sold");
        else if (block.available <= 3) el.classList.add("low");

        if (selectedBlock && selectedBlock.id === block.id) {
          el.classList.add("active");
        }

        el.textContent = block.id;
        el.title = `${block.name} | ${formatCurrency(match.currency, block.price)} | ${block.available} seats`;

        el.addEventListener("click", () => {
          if (block.available === 0) return;
          selectedBlock = block;
          renderBlocks();
          renderListings();
        });

        blocksLayer.appendChild(el);
      });
    }

    function getFilteredListings() {
      const match = getCurrentMatch();
      let listings = [...match.listings];
      const requiredTickets = parseInt(ticketCountInput.value || "1", 10);

      if (selectedBlock) {
        listings = listings.filter(item =>
          item.section === selectedBlock.name ||
          item.section.toLowerCase().includes(selectedBlock.id.toLowerCase())
        );

        if (!listings.length) {
          listings = [{
            section: selectedBlock.name,
            row: "Best Available",
            price: selectedBlock.price,
            ticketsTogether: Math.min(selectedBlock.available, 6),
            rating: 8.8,
            view: "Standard clear view",
            remaining: selectedBlock.available
          }];
        }
      }

      listings = listings.filter(item => item.ticketsTogether >= requiredTickets);

      const filterValue = availabilityFilter.value;
      if (filterValue === "available") {
        listings = listings.filter(item => item.remaining > 3);
      } else if (filterValue === "few") {
        listings = listings.filter(item => item.remaining > 0 && item.remaining <= 3);
      }

      const sortValue = sortSelect.value;
      if (sortValue === "priceLow") {
        listings.sort((a, b) => a.price - b.price);
      } else if (sortValue === "priceHigh") {
        listings.sort((a, b) => b.price - a.price);
      } else if (sortValue === "ratingHigh") {
        listings.sort((a, b) => b.rating - a.rating);
      }

      return listings;
    }

    function renderListings() {
      const match = getCurrentMatch();
      const listings = getFilteredListings();

      listingCount.textContent = `${listings.length} listings`;
      listingsEl.innerHTML = "";

      if (!listings.length) {
        listingsEl.innerHTML = `<div class="empty-state">No listings found for this filter or ticket count.</div>`;
        return;
      }

      listings.forEach(item => {
        const card = document.createElement("div");
        card.className = "ticket-card";

        card.innerHTML = `
          <div class="ticket-head">
            <div class="ticket-title">${item.section}</div>
            <div class="ticket-price-wrap">
              <div class="ticket-price">${formatCurrency(match.currency, item.price)}</div>
              <span class="badge">${item.rating}</span>
            </div>
          </div>
          <div class="ticket-row">Row ${item.row}</div>
          <div class="ticket-meta">
            <span>${item.ticketsTogether} tickets together</span>
            <span>${item.view}</span>
          </div>
          <div class="ticket-bottom">
            <div class="remaining">${item.remaining} tickets remaining in this listing</div>
            <button class="book-btn">Book Now</button>
          </div>
        `;

        const btn = card.querySelector(".book-btn");
        btn.addEventListener("click", (e) => {
          e.stopPropagation();
          alert(`Booked: ${item.section}\nRow: ${item.row}\nPrice: ${formatCurrency(match.currency, item.price)}`);
        });

        card.addEventListener("click", () => {
          const block = match.seatBlocks.find(b => b.name === item.section);
          if (block && block.available > 0) {
            selectedBlock = block;
            renderBlocks();
          }
        });

        listingsEl.appendChild(card);
      });
    }

    function renderAll() {
      updateHeader();
      renderBlocks();
      renderListings();
    }

    document.getElementById("zoomIn").addEventListener("click", () => {
      zoom += 0.1;
      stadium.style.transform = `scale(${zoom})`;
    });

    document.getElementById("zoomOut").addEventListener("click", () => {
      zoom = Math.max(0.6, zoom - 0.1);
      stadium.style.transform = `scale(${zoom})`;
    });

    document.getElementById("resetBtn").addEventListener("click", () => {
      selectedBlock = null;
      sortSelect.value = "default";
      availabilityFilter.value = "all";
      ticketCountInput.value = 2;
      zoom = 1;
      stadium.style.transform = "scale(1)";
      renderAll();
    });

    matchSelector.addEventListener("change", () => {
      selectedMatchKey = matchSelector.value;
      selectedBlock = null;
      zoom = 1;
      stadium.style.transform = "scale(1)";
      renderAll();
    });

    sortSelect.addEventListener("change", renderListings);
    availabilityFilter.addEventListener("change", renderListings);
    ticketCountInput.addEventListener("input", renderListings);

    const queryMatch = new URLSearchParams(window.location.search).get("match");
    if (queryMatch) {
      const normalized = queryMatch.trim().toLowerCase();
      const matchedKey = Object.keys(matches).find((key) => {
        const title = matches[key].title.toLowerCase();
        return title === normalized || title.includes(normalized) || normalized.includes(title);
      });

      if (matchedKey) {
        selectedMatchKey = matchedKey;
      }
    }

    fillMatchSelector();
    renderAll();
  </script>
</body>
</html>
