<!DOCTYPE html> 
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cricket Seats Marketplace</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Inter,Arial,sans-serif}
    body{background:#f3f3f3;color:#172033;overflow:hidden}
    button,select,input{font:inherit}
    .app{
      display:grid; 
      grid-template-columns:64% 36%;
      width:100%;
      height:100vh;
    }

    /* LEFT */
    .left{
      display:flex;
      flex-direction:column;
      background:#ececec;
      border-right:1px solid #ddd;
      min-width:0;
    }

    .event-bar{
      height:86px;
      background:#fff;
      border-bottom:1px solid #e5e7eb;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:18px;
      padding:12px 18px;
      flex-wrap:wrap;
    }

    .event-info{
      display:flex;
      align-items:center;
      gap:14px;
      min-width:0;
      flex:1;
    }

    .event-thumb{
      width:76px;
      height:48px;
      border-radius:8px;
      background:
        linear-gradient(180deg, rgba(0,0,0,.12), rgba(0,0,0,.08)),
        linear-gradient(0deg, #5d9d3f 0 40%, #bc9148 40% 48%, #4a7f30 48% 100%);
      position:relative;
      overflow:hidden;
      flex-shrink:0;
    }

    .event-thumb:before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 20% 20%, #466 0 2px, transparent 2px),
        radial-gradient(circle at 35% 25%, #667 0 2px, transparent 2px),
        radial-gradient(circle at 50% 18%, #445 0 2px, transparent 2px),
        radial-gradient(circle at 70% 24%, #556 0 2px, transparent 2px),
        radial-gradient(circle at 82% 20%, #445 0 2px, transparent 2px);
      opacity:.45;
    }

    .event-text{min-width:0}
    .event-title{
      font-size:15px;
      font-weight:800;
      color:#4d7f0d;
      margin-bottom:2px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .event-date{
      font-size:13px;
      color:#1f2937;
      margin-bottom:1px;
    }
    .event-location{
      font-size:13px;
      color:#334155;
      text-decoration:underline;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:420px;
    }

    .event-actions{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }
    .circle-icon{
      width:34px;height:34px;border-radius:50%;
      border:1px solid #d5d8de;background:#fff;color:#5b6473;
      display:grid;place-items:center;cursor:pointer;font-size:15px;
    }

    .map-wrap{
      flex:1;
      position:relative;
      overflow:auto;
      background:#ededed;
    }

    .map-stage{
      min-width:1080px;
      min-height:920px;
      display:flex;
      align-items:flex-start;
      justify-content:center;
      padding:20px 20px 30px;
    }

    .zoom-box{
      position:absolute;
      top:16px;
      right:16px;
      display:flex;
      flex-direction:column;
      gap:8px;
      z-index:30;
    }

    .zoom-btn{
      width:40px;height:40px;border:none;border-radius:12px;
      background:#fff;box-shadow:0 6px 18px rgba(0,0,0,.08);
      font-size:28px;line-height:1;cursor:pointer;color:#111827;
    }

    .stadium{
      width:930px;
      height:820px;
      position:relative;
      transform-origin:center top;
      transition:transform .2s ease;
    }

    /* bowl shell */
    .bowl-outer{
      position:absolute;
      inset:0;
      background:#f7f7f7;
      border:2px solid #dfe2e6;
      box-shadow:inset 0 0 0 12px #f1f1f1;
      clip-path:polygon(
        14% 10%, 30% 4%, 53% 2%, 76% 6%, 90% 16%,
        97% 32%, 98% 54%, 95% 72%, 86% 88%, 68% 98%,
        42% 100%, 20% 94%, 8% 78%, 3% 55%, 3% 35%
      );
      border-radius:22px;
    }

    .track{
      position:absolute;
      left:110px;
      top:90px;
      width:710px;
      height:710px;
      border-radius:50%;
      border:16px solid #f8f8f8;
      box-shadow:inset 0 0 0 2px #dfdfdf;
      z-index:2;
    }

    .ground{
      position:absolute;
      left:155px;
      top:135px;
      width:620px;
      height:620px;
      border-radius:50%;
      background:#4f8f34;
      box-shadow:inset 0 0 0 10px #ffffff;
      z-index:3;
    }

    .field-shadow{
      position:absolute;
      left:176px;
      top:156px;
      width:578px;
      height:578px;
      border-radius:50%;
      box-shadow:inset 0 0 90px rgba(0,0,0,.04);
      z-index:3;
      pointer-events:none;
    }

    .pitch-oval{
      position:absolute;
      left:50%;
      top:50%;
      width:58px;
      height:112px;
      transform:translate(-50%,-50%);
      border-radius:999px;
      background:#3e6f22;
      z-index:5;
      display:grid;
      place-items:center;
    }

    .pitch{
      width:20px;
      height:74px;
      background:#f2a33d;
      border:4px solid #d98721;
      border-radius:5px;
      position:relative;
      box-shadow:0 3px 0 rgba(0,0,0,.06);
    }

    .pitch:before,.pitch:after{
      content:"";
      position:absolute;
      left:50%;
      transform:translateX(-50%);
      width:18px;
      height:4px;
      border-radius:4px;
      background:rgba(255,255,255,.55);
    }
    .pitch:before{top:12px}
    .pitch:after{bottom:12px}

    .mid-line{
      position:absolute;
      left:110px;
      right:110px;
      top:50%;
      border-top:2px dashed rgba(255,255,255,.45);
      z-index:4;
      opacity:.75;
    }

    .blocks-layer,.labels-layer{
      position:absolute;
      inset:0;
      z-index:10;
    }

    .seat-block{
      position:absolute;
      background:#b6d97d;
      border:3px solid #fff;
      color:#4c6b1f;
      border-radius:6px;
      font-size:13px;
      font-weight:800;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 2px 8px rgba(0,0,0,.06);
      cursor:pointer;
      transition:.18s ease;
      user-select:none;
      text-align:center;
    }
    .seat-block:hover{transform:translateY(-1px) scale(1.03)}
    .seat-block.active{background:#70bf57;color:#fff}
    .seat-block.low{background:#e7d98b;color:#6c5a14}
    .seat-block.sold{background:#d2d7df;color:#6b7280;cursor:not-allowed}
    .seat-block.tiny{font-size:10px;border-radius:5px}
    .seat-block.mini{font-size:12px}

    .seat-label{
      position:absolute;
      background:#fff;
      border-radius:8px;
      padding:5px 8px;
      box-shadow:0 4px 14px rgba(0,0,0,.11);
      border:1px solid #efefef;
      min-width:60px;
      text-align:center;
      line-height:1.05;
      cursor:pointer;
      transition:.18s ease;
      z-index:12;
    }
    .seat-label:hover{transform:translateY(-1px)}
    .label-price{
      font-size:12px;
      font-weight:800;
      color:#111827;
      white-space:nowrap;
    }
    .label-sub{
      font-size:10px;
      font-weight:800;
      color:#e91e63;
      margin-top:2px;
      white-space:nowrap;
    }
    .label-good{
      color:#16a34a;
      font-size:10px;
      font-weight:800;
      margin-top:2px;
      white-space:nowrap;
    }

    /* RIGHT */
    .right{
      background:#fff;
      display:flex;
      flex-direction:column;
      min-width:0;
      height:100vh;
    }

    .header-top{
      height:86px;
      border-bottom:1px solid #ececec;
      padding:10px 16px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      flex-wrap:wrap;
      background:#fff;
    }

    .header-left-tools{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .currency{
      display:flex;
      align-items:center;
      gap:6px;
      color:#475569;
      font-size:13px;
      margin-right:8px;
    }

    .search-box{
      height:42px;
      min-width:320px;
      background:#fff;
      border:1px solid #dde1e6;
      border-radius:14px;
      display:flex;
      align-items:center;
      gap:10px;
      padding:0 14px;
      color:#64748b;
    }

    .top-links{
      display:flex;
      align-items:center;
      gap:20px;
      font-size:14px;
      font-weight:700;
      color:#1f2937;
    }

    .user-dot{
      width:28px;height:28px;border-radius:50%;
      background:#6b8f12;
      position:relative;
    }
    .user-dot:before{
      content:"";
      position:absolute;left:50%;top:7px;transform:translateX(-50%);
      width:8px;height:8px;border-radius:50%;background:#fff;
    }
    .user-dot:after{
      content:"";
      position:absolute;left:50%;bottom:5px;transform:translateX(-50%);
      width:14px;height:8px;border-radius:999px 999px 4px 4px;background:#fff;
    }

    .list-top{
      padding:12px 16px 10px;
      border-bottom:1px solid #ececec;
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      background:#fff;
    }

    .listing-count{
      font-size:15px;
      font-weight:800;
      color:#111827;
    }

    .list-tools{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .green-icon,.ticket-pill{
      height:34px;
      border:1px solid #9ec44d;
      background:#e8f4ce;
      color:#4b6d0d;
      border-radius:14px;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:0 12px;
      font-size:14px;
      font-weight:700;
    }
    .green-icon{width:42px;padding:0}

    .filters{
      display:flex;
      gap:10px;
      padding:0 16px 12px;
      border-bottom:1px solid #ececec;
      background:#fff;
    }
    .filters select{
      height:36px;
      border:1px solid #d8dde3;
      border-radius:12px;
      background:#fff;
      padding:0 12px;
      color:#1f2937;
      font-size:13px;
    }

    .cards{
      flex:1;
      overflow:auto;
      background:#fff;
    }

    .ticket-card{
      padding:16px 16px 15px;
      border-bottom:1px solid #ececec;
      cursor:pointer;
      transition:.18s ease;
    }
    .ticket-card:hover{background:#fafafa}

    .card-head{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:flex-start;
      margin-bottom:8px;
    }

    .section-name{
      font-size:18px;
      font-weight:800;
      line-height:1.2;
      color:#101827;
    }

    .price-side{
      flex-shrink:0;
      text-align:right;
    }

    .price{
      font-size:18px;
      font-weight:900;
      color:#111827;
      margin-bottom:4px;
    }

    .score-line{
      display:flex;
      gap:8px;
      justify-content:flex-end;
      align-items:center;
    }

    .score-badge{
      background:#0ea35a;
      color:#fff;
      border-radius:7px;
      padding:2px 8px;
      font-size:12px;
      font-weight:800;
    }

    .score-word{
      font-size:12px;
      font-weight:800;
      color:#16a34a;
    }

    .rowline{
      font-size:14px;
      font-weight:800;
      color:#111827;
      margin-bottom:4px;
    }

    .meta{
      display:flex;
      flex-direction:column;
      gap:2px;
      font-size:13px;
      color:#64748b;
      margin-bottom:8px;
    }

    .remain{
      color:#e91e63;
      font-size:13px;
      font-weight:800;
      margin-bottom:10px;
    }

    .card-bottom{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }

    .mini-icons{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      font-size:13px;
      color:#64748b;
    }

    .buy-btn{
      background:#111a33;
      color:#fff;
      border:none;
      border-radius:14px;
      height:36px;
      padding:0 18px;
      font-weight:800;
      cursor:pointer;
    }

    .show-more-wrap{
      padding:16px;
      border-top:1px solid #ececec;
      background:#fff;
    }
    .showing{
      text-align:center;
      font-size:12px;
      color:#64748b;
      margin-bottom:10px;
      font-weight:700;
    }
    .show-more{
      width:100%;
      height:44px;
      border:1px solid #d4d8de;
      background:#fff;
      border-radius:14px;
      font-weight:700;
      color:#1f2937;
      cursor:pointer;
    }

    @media (max-width:1200px){
      body{overflow:auto}
      .app{grid-template-columns:1fr;height:auto}
      .right{height:auto;min-height:600px}
      .header-top,.list-top,.filters{position:static}
    }

    @media (max-width:700px){
      .search-box{min-width:unset;width:100%}
      .top-links{gap:12px;font-size:13px}
      .event-location{max-width:220px}
    }
  </style>
</head>

  </div>

        {section:"Block X", row:"", tickets:2, price:6528, rating:9.4, quality:"Amazing", remain:4, instant:true, view:"Nice view"},
        {section:"Block K", row:"", tickets:1, price:4107, rating:8.6, quality:"Great", remain:1, instant:false, view:"Clear view"}
      ]
    };

    const cardsEl = document.getElementById("cards");
    const blocksLayer = document.getElementById("blocksLayer");
    const labelsLayer = document.getElementById("labelsLayer");
    const stadium = document.getElementById("stadium");
    const listingCount = document.getElementById("listingCount");
    const showingText = document.getElementById("showingText");
    const sortSelect = document.getElementById("sortSelect");
    const availabilitySelect = document.getElementById("availabilitySelect");

    document.getElementById("eventTitle").textContent = match.title;
    document.getElementById("eventDate").textContent = match.date;
    document.getElementById("eventLocation").textContent = match.location;
    listingCount.textContent = `${match.totalCount} listings`;
    showingText.textContent = `Showing ${match.displayedCount} of ${match.totalCount}`;

    let zoom = 1;
    let activeSection = null;

    function money(v){
      return match.currency + Number(v).toLocaleString("en-IN");
    }

    function buildSections(){
      blocksLayer.innerHTML = "";
      labelsLayer.innerHTML = "";

      match.sections.forEach(sec=>{
        const block = document.createElement("div");
        block.className = "seat-block";
        if(sec.tiny) block.classList.add("tiny");
        if(sec.mini) block.classList.add("mini");
        if(sec.group === "few") block.classList.add("low");
        if(sec.group === "sold") block.classList.add("sold");
        if(activeSection === sec.id) block.classList.add("active");

        block.style.left = sec.x + "px";
        block.style.top = sec.y + "px";
        block.style.width = sec.w + "px";
        block.style.height = sec.h + "px";
        block.textContent = sec.id.replace(/[0-9]/g, "") || sec.id;

        block.addEventListener("click", ()=>{
          if(sec.group === "sold") return;
          activeSection = sec.id;
          buildSections();
          renderCards();
        });

        blocksLayer.appendChild(block);

        if(sec.price > 0){
          const tag = document.createElement("div");
          tag.className = "seat-label";
          tag.style.left = (sec.x + sec.w/2 - 32) + "px";
          tag.style.top = (sec.y - 16) + "px";

          let subText = sec.left <= 3 ? `${sec.left} left` : `${sec.left} left`;
          let good = sec.rating >= 9 ? sec.quality : "";

          tag.innerHTML = `
            <div class="label-price">${money(sec.price)}</div>
            ${good ? `<div class="label-good">${good}</div>` : `<div class="label-sub">${subText}</div>`}
          `;

          tag.addEventListener("click", ()=>{
            if(sec.group === "sold") return;
            activeSection = sec.id;
            buildSections();
            renderCards();
          });

          labelsLayer.appendChild(tag);
        }
      });
    }

    function getCards(){
      let items = [...match.listings];

      if(activeSection){
        const sec = match.sections.find(s=>s.id===activeSection);
        if(sec){
          items = items.filter(item =>
            item.price === sec.price ||
            item.section.toLowerCase().includes(sec.id.toLowerCase())
          );
          if(!items.length){
            items = [{
              section:`Section ${sec.id}`,
              row:"",
              tickets:Math.min(sec.left || 1, 4),
              price:sec.price,
              rating:sec.rating || 8.4,
              quality:sec.quality || "Great",
              remain:sec.left || 1,
              instant:false,
              view:"Clear view"
            }];
          }
        }
      }

      if(availabilitySelect.value === "few"){
        items = items.filter(i => i.remain <= 3);
      } else if(availabilitySelect.value === "good"){
        items = items.filter(i => i.remain > 3);
      }

      if(sortSelect.value === "priceAsc"){
        items.sort((a,b)=>a.price-b.price);
      } else if(sortSelect.value === "priceDesc"){
        items.sort((a,b)=>b.price-a.price);
      } else if(sortSelect.value === "rating"){
        items.sort((a,b)=>b.rating-a.rating);
      }

      return items;
    }

    function renderCards(){
      const items = getCards();
      cardsEl.innerHTML = "";

      items.forEach(item=>{
        const card = document.createElement("div");
        card.className = "ticket-card";

        card.innerHTML = `
          <div class="card-head">
            <div class="section-name">${item.section}</div>
            <div class="price-side">
              <div class="price">${money(item.price)}</div>
              <div class="score-line">
                <span class="score-badge">${item.rating}</span>
                <span class="score-word">${item.quality}</span>
              </div>
            </div>
          </div>

          <div class="rowline">${item.row ? `Row ${item.row}` : `${item.tickets} ticket${item.tickets > 1 ? "s" : ""}`}</div>

          <div class="meta">
            ${item.row ? `<span>${item.tickets} ticket${item.tickets > 1 ? "s" : ""}</span>` : ""}
            ${item.instant ? `<span>⚡ Instant Download ⓘ</span>` : ""}
            <span>👁 ${item.view}</span>
          </div>

          <div class="remain">${item.remain} ticket${item.remain > 1 ? "s" : ""} remaining in this listing</div>

          <div class="card-bottom">
            <div class="mini-icons"></div>
            <button class="buy-btn">Book Now</button>
          </div>
        `;

        card.querySelector(".buy-btn").addEventListener("click", e=>{
          e.stopPropagation();
          alert(`Selected\\n${item.section}\\n${money(item.price)}`);
        });

        cardsEl.appendChild(card);
      });
    }

    document.getElementById("zoomIn").addEventListener("click", ()=>{
      zoom += 0.1;
      stadium.style.transform = `scale(${zoom})`;
    });

    document.getElementById("zoomOut").addEventListener("click", ()=>{
      zoom = Math.max(0.7, zoom - 0.1);
      stadium.style.transform = `scale(${zoom})`;
    });

    sortSelect.addEventListener("change", renderCards);
    availabilitySelect.addEventListener("change", renderCards);

    buildSections();
    renderCards();
  </script>
